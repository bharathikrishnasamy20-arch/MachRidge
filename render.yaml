services:
  - type: web
    name: machridge-backend
    runtime: docker
    repo: https://github.com/Prashanth-1411/MachRidge.git
    plan: free
    rootDir: backend
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_NAME
        value: MachRidge Industries
      - key: APP_URL
        fromService:
          name: machridge-backend
          type: web
          property: hostport
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: machridge-db
          property: host
      - key: DB_PASSWORD
        fromDatabase:
          name: machridge-db
          property: password
      - key: DB_PORT
        fromDatabase:
          name: machridge-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: machridge-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: machridge-db
          property: user
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_PORT
        value: 587
      - key: FILESYSTEM_DISK
        value: public
      - key: LOG_CHANNEL
        value: stderr

  - type: web
    name: machridge-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://machridge-backend.onrender.com/api
      - key: VITE_APP_NAME
        value: MachRidge Industries

databases:
  - name: machridge-db
    plan: free
    region: oregon
    databaseName: machridge
    user: machridge
