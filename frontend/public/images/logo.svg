<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B5CAD"/>
      <stop offset="100%" style="stop-color:#094a91"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#e67e00"/>
    </linearGradient>
  </defs>

  <!-- Gear icon with integrated "M" mountain shape -->
  <g transform="translate(20, 10)">
    <!-- Outer gear ring -->
    <path d="M40 5 L43 12 L50 12 L46 19 L52 24 L46 29 L50 36 L43 36 L40 43 L37 36 L30 36 L34 29 L28 24 L34 19 L30 12 L37 12 Z"
          fill="url(#primaryGrad)" />
    <!-- Inner circle -->
    <circle cx="40" cy="24" r="10" fill="#fff" />
    <!-- M mountain shape inside gear -->
    <path d="M32 30 L36 20 L40 26 L44 20 L48 30 Z" fill="url(#accentGrad)" />
  </g>

  <!-- Company name -->
  <text x="80" y="52" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="32" font-weight="800" fill="#1F1F1F" letter-spacing="-1">
    Mach<tspan fill="url(#accentGrad)">Ridge</tspan>
  </text>

  <!-- Tagline -->
  <text x="80" y="72" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#6B7280" font-weight="500" letter-spacing="3.5">
    PRECISION MANUFACTURING
  </text>

  <!-- Subtitle -->
  <text x="80" y="88" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#9CA3AF" font-weight="400" letter-spacing="1.5">
    CNC MACHINING &amp; FABRICATION
  </text>
</svg>
